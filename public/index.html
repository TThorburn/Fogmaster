<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Behind the Screen</title>
  <style>
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif; color: #e8eaed;
      background: radial-gradient(ellipse at 50% -20%, #232b3a 0%, #0e1014 60%); }
    .wrap { text-align: center; padding: 24px; max-width: 760px; width: 100%; }
    h1 { font-size: 42px; margin: 0 0 8px; letter-spacing: 1px;
      background: linear-gradient(90deg, #7db8ff, #b891ff);
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    .tagline { color: #8b93a0; margin: 0 0 40px; font-style: italic; font-size: 15px; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 560px) { .cards { grid-template-columns: 1fr; } }
    .card { display: block; background: linear-gradient(180deg, #20242c, #191c22);
      border: 1px solid #2e333b; border-radius: 16px; padding: 34px 22px; color: inherit;
      text-decoration: none; cursor: pointer; font: inherit; text-align: center;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s; width: 100%; margin: 0; }
    .card:hover { transform: translateY(-4px); border-color: #4c9aff;
      box-shadow: 0 8px 30px rgba(76,154,255,0.18); }
    .icon { font-size: 44px; margin-bottom: 12px; }
    .card h2 { margin: 0 0 8px; font-size: 20px; color: #e8eaed; }
    .card p { margin: 0; color: #8b93a0; font-size: 13px; line-height: 1.4; }
    .auth { margin: 26px auto 0; max-width: 360px; background: #1d2026; border: 1px solid #2e333b;
      border-radius: 16px; padding: 20px; text-align: left; box-shadow: 0 8px 30px rgba(0,0,0,0.35); }
    .auth h3 { margin: 0 0 4px; font-size: 16px; }
    .hint { color: #8b93a0; font-size: 12px; line-height: 1.4; margin: 4px 0 0; }
    input, .auth button { width: 100%; margin-top: 8px; padding: 9px 11px; border-radius: 8px;
      border: 1px solid #3a4048; background: #262a31; color: #e8eaed; font-size: 13px; }
    .auth button { cursor: pointer; background: #2563a8; border-color: #4c9aff; font-weight: 600; }
    .auth button:hover { background: #2d74c4; }
    .err { color: #f0b3ba; font-size: 13px; min-height: 16px; margin: 8px 0 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Behind the Screen</h1>
    <p class="tagline">The DM paints, the players discover.</p>

    <div class="cards">
      <a class="card" href="/player.html">
        <div class="icon">🗺️</div>
        <h2>Player</h2>
        <p>Watch the map unfold as your party explores.</p>
      </a>
      <button class="card" id="dmCard" type="button">
        <div class="icon">🎲</div>
        <h2>Dungeon Master</h2>
        <p>Control the fog, the maps, and the mystery.</p>
      </button>
    </div>

    <div class="auth" id="authBox" hidden>
      <h3 id="authTitle">DM password</h3>
      <p class="hint" id="authHint"></p>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      <input id="password2" type="password" placeholder="Confirm password" autocomplete="new-password" hidden />
      <button id="authSubmit" type="button">Enter</button>
      <p class="err" id="authError"></p>
    </div>
  </div>

  <script>
    let needsSetup = false;

    document.getElementById('dmCard').onclick = async () => {
      const st = await (await fetch('/auth/status')).json();
      if (st.dm) { location.href = '/dm.html'; return; }
      needsSetup = !st.setup;
      document.getElementById('authBox').hidden = false;
      document.getElementById('password2').hidden = !needsSetup;
      document.getElementById('authTitle').textContent = needsSetup ? 'Create your DM password' : 'DM password';
      document.getElementById('authHint').textContent = needsSetup
        ? 'First time setup — this password protects the DM screen and is saved on the server.'
        : 'Enter the DM password to continue.';
      document.getElementById('authSubmit').textContent = needsSetup ? 'Create & enter' : 'Enter';
      document.getElementById('password').focus();
    };

    async function submit() {
      const pw = document.getElementById('password').value;
      const err = document.getElementById('authError');
      err.textContent = '';
      if (needsSetup && pw !== document.getElementById('password2').value) {
        err.textContent = 'Passwords do not match.';
        return;
      }
      const r = await fetch(needsSetup ? '/auth/setup' : '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await r.json();
      if (r.ok) location.href = '/dm.html';
      else err.textContent = data.error || 'Something went wrong.';
    }

    document.getElementById('authSubmit').onclick = submit;
    document.getElementById('authBox').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  </script>
</body>
</html>
